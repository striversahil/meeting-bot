# PulseAudio daemon configuration for optimized container recording
# Standardize on 48kHz for Google Meet compatibility
default-sample-rate = 48000
alternate-sample-rate = 44100
default-sample-channels = 1

# Increase buffer sizes to prevent crackling/underruns in resource-constrained environments (1-2 vCPU)
default-fragments = 16
default-fragment-size-msec = 25

# Disable idle exit to keep the virtual sink alive
exit-idle-time = -1

# Lower CPU overhead — we don't need complex resampling
avoid-resampling = yes
resample-method = trivial
